<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
Health Connect | Hospital Portal
</title>


<style>


*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;

}




body{


background:

linear-gradient(
rgba(0,51,102,.75),
rgba(0,51,102,.75)
),

url("images/doctor-patient-background.jpg");


background-size:cover;

background-position:center;

background-attachment:fixed;


}






header{


background:#003366;

color:white;

padding:20px;

text-align:center;


}






.container{


min-height:90vh;


display:flex;

justify-content:center;

align-items:center;


padding:40px;


}







.box{


width:750px;


background:

rgba(255,255,255,.15);


backdrop-filter:blur(15px);


padding:40px;


border-radius:20px;


color:white;


box-shadow:0 0 30px black;


}





h2{


text-align:center;

color:#00f0ff;

margin-bottom:25px;


}





.patient{


background:white;

color:black;

padding:20px;

border-radius:10px;

line-height:30px;

margin-bottom:20px;


}





label{


display:block;

font-weight:bold;

margin-top:15px;


}




select,
textarea{


width:100%;

padding:12px;

border:none;

border-radius:8px;

margin-top:8px;


}





button{


width:100%;


padding:15px;


background:green;


color:white;


border:none;


border-radius:8px;


font-size:18px;


margin-top:20px;


cursor:pointer;


}




button:hover{


background:#006400;


}





footer{


background:#003366;


color:white;


padding:15px;


text-align:center;


}



</style>


</head>




<body>





<header>


<h1>

Health Connect Hospital Portal

</h1>


</header>






<div class="container">



<div class="box">



<h2>

Patient Admission Request

</h2>





<div class="patient" id="patientInfo">

Waiting for administrator request...

</div>






<label>

Hospital Department

</label>


<select id="department">


<option>
Emergency
</option>


<option>
General Medicine
</option>


<option>
Surgery
</option>


<option>
Maternity
</option>


<option>
Pediatrics
</option>


</select>








<label>

Assigned Doctor

</label>



<select id="doctor">


<option>
Dr. Jean Pierre
</option>


<option>
Dr. Alice Uwase
</option>


<option>
Dr. Emmanuel
</option>


<option>
Dr. Diane
</option>


</select>







<label>

Admission Notes

</label>


<textarea id="notes"

placeholder="Enter admission notes">

</textarea>







<button onclick="admitPatient()">

Confirm Patient Admission

</button>






</div>





</div>








<footer>


© 2026 Health Connect | Hospital Management System


</footer>







<script>






// =================================
// HOSPITAL JAVASCRIPT
// =================================







// Receive request from administrator.html



let request =


JSON.parse(

localStorage.getItem(

"hospitalRequest"

)

);







if(request){





let patient=request.patient;





document.getElementById(

"patientInfo"

).innerHTML=




`

<b>Name:</b> ${patient.name}<br>

<b>Age:</b> ${patient.age}<br>

<b>Gender:</b> ${patient.gender}<br>

<b>Phone:</b> ${patient.phone}<br>

<b>Symptoms:</b> ${patient.symptoms}<br>

<b>Diagnosis:</b> ${request.diagnosis}

`;





}









// Confirm admission



function admitPatient(){





let department =


document.getElementById(

"department"

).value;






let doctor =


document.getElementById(

"doctor"

).value;







let notes =


document.getElementById(

"notes"

).value;







let response =




`

Hospital Admission Completed


Patient:

${request.patient.name}



Department:

${department}



Assigned Doctor:

${doctor}



Admission Notes:

${notes}



Status:

Patient admitted successfully.

`;








// Send response back



localStorage.setItem(

"hospitalResponse",

response

);






alert(

"Admission response sent to administrator"

);







}







</script>





</body>

</html>
