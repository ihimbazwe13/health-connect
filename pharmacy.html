<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
Health Connect | Pharmacy Portal
</title>


<style>


*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;

}




body{


background:


linear-gradient(

rgba(0,51,102,.75),

rgba(0,51,102,.75)

),


url("images/pharmacy-background.jpg");



background-size:cover;


background-position:center;


background-attachment:fixed;


}







header{


background:#003366;


color:white;


padding:20px;


text-align:center;


}








.container{


min-height:90vh;


display:flex;


justify-content:center;


align-items:center;


padding:40px;


}









.box{


width:750px;



background:

rgba(255,255,255,.15);



backdrop-filter:blur(15px);



padding:40px;



border-radius:20px;



color:white;



box-shadow:0 0 30px black;



}







h2{


text-align:center;


color:#00f0ff;


margin-bottom:25px;


}









.patient{


background:white;


color:black;


padding:20px;


border-radius:10px;


line-height:30px;


margin-bottom:20px;


}








label{


display:block;


font-weight:bold;


margin-top:15px;


}





input,
select,
textarea{


width:100%;


padding:12px;


border:none;


border-radius:8px;


margin-top:8px;


}







button{


width:100%;


padding:15px;



background:green;



color:white;



border:none;



border-radius:8px;



font-size:18px;



cursor:pointer;



margin-top:20px;



}






button:hover{


background:#006400;


}








footer{


background:#003366;


color:white;


padding:15px;


text-align:center;


}




</style>


</head>







<body>






<header>


<h1>

Health Connect Pharmacy Portal

</h1>


</header>









<div class="container">


<div class="box">





<h2>

Prescription Request Received

</h2>







<div class="patient" id="prescriptionInfo">


Waiting for prescription request...

</div>







<label>

Pharmacy Name

</label>



<select id="pharmacy">


<option>

Goodlife Pharmacy

</option>


<option>

MediCare Pharmacy

</option>


<option>

Health First Pharmacy

</option>


<option>

City Pharmacy

</option>


<option>

CarePlus Pharmacy

</option>


</select>








<label>

Medicine Availability

</label>



<select id="availability">


<option>

Available

</option>


<option>

Not Available

</option>


<option>

Order Required

</option>


</select>








<label>

Pharmacist Notes

</label>



<textarea id="notes"

placeholder="Enter pharmacy notes">

</textarea>







<button onclick="prepareMedicine()">

Confirm Medicine Delivery

</button>






</div>


</div>









<footer>


© 2026 Health Connect | Pharmacy Management System


</footer>









<script>






// =====================================
// PHARMACY JAVASCRIPT
// =====================================







// Receive prescription request



let request =



JSON.parse(



localStorage.getItem(

"pharmacyRequest"

)



);









if(request){





let patient=request.patient;






document.getElementById(

"prescriptionInfo"

).innerHTML=




`

<b>Patient Name:</b>

${patient.name}<br>


<b>Phone:</b>

${patient.phone}<br>


<b>Email:</b>

${patient.email}<br>


<b>Symptoms:</b>

${patient.symptoms}<br>


<br>


<b>Prescription:</b>

${request.medicine}



`;




}











// Confirm medicine preparation



function prepareMedicine(){





let pharmacy =



document.getElementById(

"pharmacy"

).value;







let availability =



document.getElementById(

"availability"

).value;







let notes =



document.getElementById(

"notes"

).value;








let response =





`

Pharmacy Response


Patient:

${request.patient.name}



Pharmacy:

${pharmacy}



Medicine Status:

${availability}



Pharmacist Notes:

${notes}



Final Status:

Medicine request processed successfully.

`;







// Send response back to administrator



localStorage.setItem(


"pharmacyResponse",


response


);






alert(

"Medicine response sent to administrator"

);






}







</script>






</body>

</html>
