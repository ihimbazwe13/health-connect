<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
Health Connect | Administrator Dashboard
</title>


<style>


*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;

}



body{


background:

linear-gradient(
rgba(0,0,0,.75),
rgba(0,0,0,.75)
),

url("images/doctor-background.jpg");


background-size:cover;

background-position:center;

background-attachment:fixed;


}




header{


background:#003366;

color:white;

padding:20px;

text-align:center;


}




.main{


display:flex;

min-height:90vh;


}





.sidebar{


width:350px;

background:#0b3d91;

color:white;

padding:20px;


}



.sidebar h2{


text-align:center;

margin-bottom:20px;


}




.card{


background:

rgba(255,255,255,.15);


backdrop-filter:blur(15px);


color:white;


padding:30px;


margin:30px;


border-radius:15px;


box-shadow:0 0 30px black;


flex:1;


}




input,
select,
textarea{


width:100%;


padding:12px;


margin-bottom:15px;


border-radius:8px;


border:none;


}




button{


background:green;

color:white;

border:none;

padding:12px 20px;

border-radius:6px;

cursor:pointer;

margin-top:10px;


}



button:hover{


background:#006400;


}



.patient-box{


background:white;

color:black;

padding:20px;

border-radius:10px;

line-height:30px;


}



.response{


background:white;

color:black;

padding:15px;

margin-top:20px;

border-radius:10px;


}




footer{


background:#003366;

color:white;

padding:15px;

text-align:center;


}


</style>


</head>





<body>





<header>

<h1>

Health Connect Administrator Dashboard

</h1>

</header>







<div class="main">






<div class="sidebar">



<h2>

Patient Control

</h2>



<button onclick="sendToHospital()">

Admit Patient

</button>



<button onclick="sendToPharmacy()">

Send Prescription

</button>


<button onclick="sendEmail()">

Send Conclusion Email

</button>




</div>









<div class="card">





<h2>

Patient Information Received

</h2>





<div class="patient-box" id="patientData">


Waiting for patient information...

</div>








<h2>

Doctor Decision

</h2>





<label>

Diagnosis

</label>


<textarea id="diagnosis"
placeholder="Enter diagnosis">

</textarea>





<label>

Prescription

</label>


<textarea id="prescription"
placeholder="Enter medicine prescription">

</textarea>







<h2>

System Responses

</h2>




<div class="response" id="hospitalResponse">

Hospital response waiting...

</div>





<div class="response" id="pharmacyResponse">

Pharmacy response waiting...

</div>





</div>




</div>







<footer>

© 2026 Health Connect | Administrator System

</footer>







<script>





// =======================================
// ADMINISTRATOR JAVASCRIPT
// =======================================





// Receive patient data from signup.html



let patient =

JSON.parse(

localStorage.getItem("patient")

);






if(patient){



document.getElementById("patientData").innerHTML=



`

<b>Name:</b> ${patient.name}<br>

<b>Age:</b> ${patient.age}<br>

<b>Gender:</b> ${patient.gender}<br>

<b>Phone:</b> ${patient.phone}<br>

<b>Email:</b> ${patient.email}<br>

<b>Address:</b> ${patient.address}<br>

<b>Symptoms:</b> ${patient.symptoms}

`;



}








// Send admission request to hospital



function sendToHospital(){





let request={


patient:patient,

diagnosis:

document.getElementById("diagnosis").value,


status:"Admission Requested"


};






localStorage.setItem(

"hospitalRequest",

JSON.stringify(request)

);





alert(

"Patient admission request sent to hospital"

);





}









// Send prescription to pharmacy



function sendToPharmacy(){





let prescription={


patient:patient,


medicine:

document.getElementById("prescription").value,


status:"Prescription Sent"


};






localStorage.setItem(

"pharmacyRequest",

JSON.stringify(prescription)

);





alert(

"Prescription sent to pharmacy"

);






}









// Receive hospital and pharmacy responses



function checkResponses(){





let hospital =

localStorage.getItem(

"hospitalResponse"

);




let pharmacy =

localStorage.getItem(

"pharmacyResponse"

);






if(hospital){


document.getElementById(

"hospitalResponse"

).innerHTML=

hospital;


}






if(pharmacy){


document.getElementById(

"pharmacyResponse"

).innerHTML=

pharmacy;


}



}






setInterval(

checkResponses,

2000

);









// Email conclusion



function sendEmail(){






let hospital =

localStorage.getItem(

"hospitalResponse"

)||

"Hospital response pending";






let pharmacy =

localStorage.getItem(

"pharmacyResponse"

)||

"Pharmacy response pending";








let message =



`

Health Connect Medical Conclusion


Patient:

${patient.name}



Hospital Status:

${hospital}



Pharmacy Status:

${pharmacy}



Thank you for using Health Connect.

`;







window.location.href =


"mailto:"+

patient.email+

"?subject=Health Connect Medical Result&body="

+

encodeURIComponent(message);






}







</script>




</body>

</html>
