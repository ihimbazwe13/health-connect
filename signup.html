<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Patient Registration | Health Connect</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial, sans-serif;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            padding:40px 0;

            background:
            linear-gradient(
            rgba(11,16,32,0.75),
            rgba(11,16,32,0.75)),
            url("images/nurse-patient.jpg");

            background-size:cover;
            background-position:center;
            background-attachment:fixed;
        }

        /* Background Glow */

        .orb{
            position:absolute;
            width:350px;
            height:350px;
            background:linear-gradient(
            45deg,
            #00f0ff,
            #0077ff);

            border-radius:50%;
            filter:blur(120px);

            top:-100px;
            right:-100px;

            opacity:0.4;
            z-index:-1;
        }

        /* Glass Form */

        .glass-form-container{

            width:850px;

            background:rgba(
            255,
            255,
            255,
            0.12);

            border:1px solid rgba(
            255,
            255,
            255,
            0.15);

            backdrop-filter:blur(15px);
            -webkit-backdrop-filter:blur(15px);

            padding:40px;

            border-radius:20px;

            box-shadow:
            0 20px 40px
            rgba(0,0,0,0.4);

        }

        /* Header */

        .form-header{
            text-align:center;
            margin-bottom:30px;
        }

        .form-header img{
            margin-bottom:15px;
        }

        .form-header h2{
            color:#00f0ff;
            font-size:32px;
            margin-bottom:10px;
        }

        .form-header p{
            color:#d9e6ff;
        }

        /* Sections */

        .form-section{
            margin-bottom:30px;
        }

        .form-section h3{
            color:#00f0ff;
            margin-bottom:20px;
            border-bottom:
            1px solid rgba(
            255,
            255,
            255,
            0.15);

            padding-bottom:10px;
        }

        .input-row{
            display:flex;
            gap:20px;
            margin-bottom:20px;
        }

        .input-wrapper{
            flex:1;
        }

        .input-wrapper label{
            display:block;
            margin-bottom:8px;
            font-size:14px;
            font-weight:bold;
        }

        .input-wrapper input,
        .input-wrapper select,
        textarea{

            width:100%;
            padding:12px;
            border:none;
            border-radius:10px;
            outline:none;
            background:white;
            color:black;

        }

        textarea{
            resize:vertical;
        }

        /* Radio Buttons */

        .radio-group{
            display:flex;
            gap:20px;
            margin-top:10px;
        }

        .radio-item{
            display:flex;
            align-items:center;
            gap:8px;
        }

        /* Checkboxes */

        .check-grid{
            display:grid;
            grid-template-columns:
            repeat(2,1fr);

            gap:10px;
            margin-top:10px;
        }

        .check-item{
            display:flex;
            align-items:center;
            gap:10px;
        }

        /* Range */

        .range-labels{
            display:flex;
            justify-content:space-between;
            margin-top:5px;
            color:#d9e6ff;
        }

        /* Button */

        .glow-btn{

            width:100%;
            padding:15px;

            border:none;
            border-radius:30px;

            background:#0077ff;
            color:white;

            font-size:16px;
            font-weight:bold;

            cursor:pointer;
            transition:0.3s;

        }

        .glow-btn:hover{

            background:#00aaff;
            transform:scale(1.02);

        }

        /* Link */

        .back-link{

            display:block;
            text-align:center;

            margin-top:20px;

            color:#00f0ff;
            text-decoration:none;

        }

        .back-link:hover{
            text-decoration:underline;
        }

        /* Footer */

        .footer{

            text-align:center;
            margin-top:25px;

            color:#d9e6ff;
            font-size:14px;

        }

        /* Mobile */

        @media(max-width:900px){

            .glass-form-container{
                width:95%;
            }

            .input-row{
                flex-direction:column;
            }

            .check-grid{
                grid-template-columns:1fr;
            }

        }

    </style>

</head>

<body>

    <div class="orb"></div>

    <div class="glass-form-container">

        <!-- Header -->

        <div class="form-header">

            <!-- Optional Logo -->
            <!--
            <img src="images/logo.png"
                 alt="Health Connect Logo"
                 width="90">
            -->

            <h2>Health Connect Registration</h2>

            <p>
                Register your health information and
                connect with doctors, hospitals and
                pharmacies.
            </p>

        </div>

        <!-- FORM -->

        <form action="administrator.html">

            <!-- SECTION 1 -->

            <div class="form-section">

                <h3>01. Identity & Contact</h3>

                <div class="input-row">

                    <div class="input-wrapper">

                        <label>Full Name</label>

                        <input
                        type="text"
                        placeholder="e.g. MUKANDOLI Jean"
                        required>

                    </div>

                    <div class="input-wrapper">

                        <label>Date of Birth</label>

                        <input
                        type="date"
                        required>

                    </div>

                </div>

                <div class="input-row">

                    <div class="input-wrapper">

                        <label>Email Address</label>

                        <input
                        type="email"
                        placeholder="healthconnect@gmail.com"
                        required>

                    </div>

                    <div class="input-wrapper">

                        <label>Phone Number</label>

                        <input
                        type="tel"
                        placeholder="+250 790 000 000">

                    </div>

                </div>

                <div class="input-row">

                    <div class="input-wrapper">

                        <label>District</label>

                        <select required>

                            <option disabled selected>
                                Select District
                            </option>

                            <option>Nyarugenge</option>
                            <option>Gasabo</option>
                            <option>Kicukiro</option>
                            <option>Musanze</option>
                            <option>Rubavu</option>
                            <option>Huye</option>
                            <option>Rusizi</option>
                            <option>Nyagatare</option>

                        </select>

                    </div>

                    <div class="input-wrapper">

                        <label>Sector</label>

                        <input
                        type="text"
                        placeholder="Enter Sector">

                    </div>

                </div>

            </div>

            <!-- SECTION 2 -->

            <div class="form-section">

                <h3>02. Biological Parameters</h3>

                <div class="input-row">

                    <div class="input-wrapper">

                        <label>Blood Type</label>

                        <select required>

                            <option disabled selected>
                                Select Type
                            </option>

                            <option>A+</option>
                            <option>A-</option>
                            <option>B+</option>
                            <option>B-</option>
                            <option>AB+</option>
                            <option>AB-</option>
                            <option>O+</option>
                            <option>O-</option>

                        </select>

                    </div>

                    <div class="input-wrapper">

                        <label>Priority Level</label>

                        <div class="radio-group">

                            <label class="radio-item">

                                <input
                                type="radio"
                                name="priority"
                                checked>

                                Standard

                            </label>

                            <label class="radio-item">

                                <input
                                type="radio"
                                name="priority">

                                Urgent

                            </label>

                        </div>

                    </div>

                </div>

            </div>

            <!-- SECTION 3 -->

            <div class="form-section">

                <h3>03. Medical History</h3>

                <div class="input-wrapper">

                    <label>Current Pain Level</label>

                    <input
                    type="range"
                    min="0"
                    max="10">

                    <div class="range-labels">

                        <span>Low</span>
                        <span>High</span>

                    </div>

                </div>

                <br>

                <div class="input-wrapper">

                    <label>Known Allergies</label>

                    <div class="check-grid">

                        <label class="check-item">
                            <input type="checkbox">
                            Penicillin
                        </label>

                        <label class="check-item">
                            <input type="checkbox">
                            Peanuts
                        </label>

                        <label class="check-item">
                            <input type="checkbox">
                            Latex
                        </label>

                        <label class="check-item">
                            <input type="checkbox">
                            Pollen
                        </label>

                    </div>

                </div>

                <br>

                <div class="input-wrapper">

                    <label>Detailed Symptoms</label>

                    <textarea
                    rows="5"
                    placeholder="Explain your condition in detail..."></textarea>

                </div>

            </div>

            <!-- Submit -->

            <button
            type="submit"
            class="glow-btn">

                Submit Registration

            </button>

        </form>

        <a href="index.html"
           class="back-link">

            ← Return to Homepage

        </a>

        <div class="footer">

            © 2026 Health Connect |
            Smart Healthcare Management System

        </div>

    </div>

</body>
</html>
